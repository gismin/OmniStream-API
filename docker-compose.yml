version: "3.9"

services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: omnistream_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-omnistream}
      POSTGRES_USER: ${POSTGRES_USER:-omnistream}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omnistream}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omnistream_net

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: omnistream_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-omnistream}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-omnistream}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - omnistream_net

  # ── React Frontend (Nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: omnistream_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - omnistream_net

volumes:
  postgres_data:

networks:
  omnistream_net:
    driver: bridge
